<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Layar Masjid</title>
  <link rel="stylesheet" href="/layarmasjid/assets/css/style.css">
</head>
<body>
  <div class="screen-shell">
    <aside class="left-panel">
      <span class="panel-corner panel-corner--top-left" aria-hidden="true"></span>
      <span class="panel-corner panel-corner--top-right" aria-hidden="true"></span>
      <span class="panel-corner panel-corner--bottom-left" aria-hidden="true"></span>
      <span class="panel-corner panel-corner--bottom-right" aria-hidden="true"></span>

      <div class="sidebar-main">
        <img class="sidebar-top-ornament" src="/layarmasjid/assets/img/sidebar-top-ornament.svg" alt="" aria-hidden="true">
        <span class="sidebar-lantern sidebar-lantern--left" aria-hidden="true"></span>
        <span class="sidebar-lantern sidebar-lantern--right" aria-hidden="true"></span>

        <div class="sidebar-content">
          <section class="clock-card" aria-label="Waktu saat ini">
            <div class="clock-display">
              <span class="clock-main" id="clock-main">08.34</span>
              <span class="clock-seconds" id="clock-seconds">17</span>
            </div>
            <p class="date-display" id="date-display">Sabtu, 02 Mei 2026</p>
            <div class="date-ornament" aria-hidden="true"></div>
          </section>

          <section class="schedule-card">
            <div class="schedule-list" id="schedule-list">
              <div class="schedule-row active">
                <span class="prayer-name">Subuh</span>
                <span class="prayer-time">04:36</span>
              </div>
              <div class="schedule-row">
                <span class="prayer-name">Syuruq</span>
                <span class="prayer-time">05:52</span>
              </div>
              <div class="schedule-row">
                <span class="prayer-name">Dzuhur</span>
                <span class="prayer-time">11:54</span>
              </div>
              <div class="schedule-row">
                <span class="prayer-name">Ashar</span>
                <span class="prayer-time">15:14</span>
              </div>
              <div class="schedule-row">
                <span class="prayer-name">Maghrib</span>
                <span class="prayer-time">17:48</span>
              </div>
              <div class="schedule-row">
                <span class="prayer-name">Isya</span>
                <span class="prayer-time">18:59</span>
              </div>
            </div>
          </section>
        </div>
      </div>

      <div class="sidebar-endcap-wrap">
        <div class="schedule-endcap" aria-hidden="true">
          <span class="schedule-endcap-line"></span>
          <span class="schedule-endcap-mark"></span>
          <span class="schedule-endcap-line"></span>
        </div>
      </div>
    </aside>

    <main class="right-panel">
      <header class="content-header">
        <div class="content-brand" aria-label="Logo masjid">
          <div class="content-brand-frame" id="content-brand-frame">
            <img
              id="content-brand-logo"
              class="content-brand-logo"
              src="/layarmasjid/assets/img/contoh_logo/masjid_astra.png"
              alt="Logo Masjid Astra"
            >
          </div>
        </div>

        <div class="content-identity">
          <h1 class="content-mosque-name">Masjid Al Ikhlas</h1>
          <p class="content-address">Jl. Contoh No. 12, Jakarta Selatan</p>
        </div>
      </header>

      <section class="content-stage" aria-label="Area slide">
        <div class="content-stage-frame" id="content-stage-frame">
          <div class="content-stage-slides" id="content-stage-slides" aria-live="polite"></div>
        </div>
        <div class="content-stage-dots" id="content-stage-dots" aria-hidden="true"></div>
      </section>

      <footer class="content-ticker" aria-label="Running text">
        <div class="content-ticker-label">Info</div>
        <div class="content-ticker-track">
          <div class="content-ticker-text">
            <span class="content-ticker-item">Running text placeholder</span>
            <span class="content-ticker-item">Pengumuman kajian ba’da Maghrib</span>
            <span class="content-ticker-item">Mohon rapikan sandal di area rak</span>
            <span class="content-ticker-item">Infaq terbaik untuk operasional masjid</span>
          </div>
        </div>
      </footer>
    </main>
  </div>

  <script src="/layarmasjid/assets/js/app.js"></script>
</body>
</html>
